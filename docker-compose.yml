###############################################################################
# Stack: Kasm Workspaces + Ollama + openclaw-agent + openclaw-chat
#
# All images are pre-built on GHCR via GitHub Actions.
# No local build, no config bind mounts.
# Configs (Squid, SearXNG) are embedded in their images and copied
# into volumes on first startup by their entrypoints.
#
# External networks to verify before startup:
#   docker network ls | grep -E "coolify|forgejo"
###############################################################################

networks:
  coolify:
    external: true

  frontend:
    driver: bridge

  backend:
    driver: bridge
    internal: true

  forgejo-net:
    external: true

  docs-net:
    driver: bridge

  mcp-net:
    driver: bridge
    internal: true   # agents в†” mcp-docs/devdocs/searxng/browserless only

  proxy-net:
    driver: bridge
    # not internal: squid needs internet access for proxying

  proxy-internal-net:
    driver: bridge
    internal: true   # openclaw-agent and openclaw-chat в†” squid only

volumes:
  ollama_data:
  ollama_cpu_data:
  gguf_cache:        # HuggingFace cache for Qwen3.5-27B-Q3_K_M.gguf (13.5GB)
  project_data:      # shared project context across all services (memory, handoffs, rules)
  devdocs_data:
  searxng_data:
  squid_etc:
  squid_whitelist:
  squid_cache:
  squid_logs:
  openclaw_agent_data:
  openclaw_chat_data:

services:

  # в”Ђв”Ђ Ollama вЂ” NVIDIA (RTX 2080 Ti + GTX 1660 = 17 GB VRAM) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # в”Ђв”Ђ Ollama CPU вЂ” qwen3.5:0.8b only, zero GPU VRAM в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Used by the gpu-scheduler for ambiguity analysis and structured
  # extraction of issues (gray zone 45-75). Runs on CPU, separate from ollama
  # to guarantee zero interference with ongoing GPU inferences.
  # Also used as human conversational buffer when GPUs are saturated.
  ollama-cpu:
    image: ollama/ollama:latest
    container_name: ollama-cpu
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ollama_cpu_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=0          # Force CPU only
      - OLLAMA_NUM_PARALLEL=2     # Max 2 simultaneous requests (analysis + buffer)
      - OLLAMA_KEEP_ALIVE=5m      # Unload model after 5min idle
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # в”Ђв”Ђ Ollama init вЂ” pull all models on first startup в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Ephemeral container (restart: no) that runs once.
  # Waits for ollama and ollama-cpu to be healthy, then:
  #   - Pulls qwen3.5:9b, 4b, 2b from the Ollama registry (GPU)
  #   - Downloads Qwen3.5-27B-Q3_K_M.gguf from HuggingFace and imports it
  #   - Pulls qwen3.5:0.8b on ollama-cpu
  # Models are persisted in ollama_data / ollama_cpu_data volumes.
  # On stack restart, ollama-init returns 0 immediately since models
  # are already present (checked via /api/tags before pull).
  ollama-init:
    image: ghcr.io/pikatsuto/cdw-ollama-init:latest
    container_name: ollama-init
    restart: "no"
    networks:
      - backend
    volumes:
      - ollama_data:/root/.ollama
      - gguf_cache:/tmp/gguf-cache
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      - GGUF_CACHE_DIR=/tmp/gguf-cache
    depends_on:
      ollama:
        condition: service_healthy
      ollama-cpu:
        condition: service_healthy

  # в”Ђв”Ђ devcontainer вЂ” NOTE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Code Server sessions are EPHEMERAL containers dynamically spawned
  # by the orchestrator (POST /dev/create) вЂ” not a fixed service in this compose.
  #
  # Image: ghcr.io/pikatsuto/cdw-devcontainer:latest (built by CI)
  # Spawn via: openclaw-agent в†’ docker run --rm --network coolify ...
  # Ephemeral URLs via dynamic Traefik labels: dev-<id>.<DEV_DOMAIN>
  #
  # Persistent per-user volumes (auto-created on first spawn):
  #   dev_user_<userId>_vscode      в†ђ VSCode settings + keybindings
  #   dev_user_<userId>_extensions  в†ђ installed extensions
  #   dev_user_<userId>_openclaw    в†ђ OpenClaw gateway config
  #
  # Variables to add in .env:
  #   DEVCONTAINER_IMAGE, DEVCONTAINER_MEMORY, DEVCONTAINER_CPUS
  #   DEV_DOMAIN, DEV_IDLE_MS

  # в”Ђв”Ђ DevDocs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  devdocs:
    image: ghcr.io/freecodecamp/devdocs:latest
    container_name: devdocs
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    ports:
      - "127.0.0.1:9292:9292"
    volumes:
      - devdocs_data:/devdocs/public/docs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9292"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # в”Ђв”Ђ SearXNG в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  searxng:
    image: ghcr.io/pikatsuto/cdw-searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # в”Ђв”Ђ Browserless в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  browserless:
    image: ghcr.io/pikatsuto/cdw-browserless:latest
    container_name: browserless
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    ports:
      - "127.0.0.1:3457:3000"
    shm_size: '512mb'
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # в”Ђв”Ђ MCP Docs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  mcp-docs:
    image: ghcr.io/pikatsuto/cdw-mcp-docs:latest
    container_name: mcp-docs
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
      - backend
    depends_on:
      devdocs:
        condition: service_healthy
      searxng:
        condition: service_healthy
      browserless:
        condition: service_healthy
    environment:
      - DEVDOCS_URL=http://devdocs:9292
      - SEARXNG_URL=http://searxng:8080
      - NODRIVER_URL=http://browserless:3000
      - MAX_RESULTS=5
      - FETCH_TIMEOUT=8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # в”Ђв”Ђ Squid agent в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Outbound proxy for openclaw-agent. Shared whitelist via squid_agent_whitelist.
  # Hot unblock:
  #   docker exec agent-squid sh -c "echo '.domain.com' >> /etc/squid/whitelist/whitelist.conf && squid -k reconfigure"
  squid:
    image: ghcr.io/pikatsuto/cdw-squid:latest
    container_name: cdw-squid
    restart: unless-stopped
    networks:
      - proxy-net
      - proxy-internal-net
    volumes:
      - squid_etc:/etc/squid
      - squid_whitelist:/etc/squid/whitelist
      - squid_cache:/var/spool/squid
      - squid_logs:/var/log/squid
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # в”Ђв”Ђ openclaw-agent в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Autonomous development agent, triggered by Forgejo webhook.
  # No exposed UI. Configure the webhook in Forgejo:
  #   Repo в†’ Settings в†’ Webhooks в†’ http://openclaw-agent:9000/webhook
  openclaw-agent:
    image: ghcr.io/pikatsuto/cdw-agent:latest
    container_name: openclaw-agent
    restart: unless-stopped
    privileged: true
    security_opt:
      - apparmor:unconfined
    depends_on:
      ollama:
        condition: service_healthy
      squid:
        condition: service_healthy
      mcp-docs:
        condition: service_healthy
    networks:
      - coolify
      - proxy-internal-net  # в†” squid (proxy) вЂ” no direct internet
      - backend             # Ollama
      - mcp-net             # mcp-docs, devdocs, searxng, browserless
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:27b-q3_k_m}
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      # в”Ђв”Ђ Models by complexity level в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_STANDARD=${MODEL_STANDARD:-qwen3.5:9b}
      - MODEL_LIGHT=${MODEL_LIGHT:-qwen3.5:4b}
      - MODEL_TRIVIAL=${MODEL_TRIVIAL:-qwen3.5:2b}
      - MODEL_CPU=${MODEL_CPU:-qwen3.5:0.8b}
      - VRAM_COMPLEX=${VRAM_COMPLEX:-14}
      - VRAM_STANDARD=${VRAM_STANDARD:-5}
      - VRAM_LIGHT=${VRAM_LIGHT:-3}
      - VRAM_TRIVIAL=${VRAM_TRIVIAL:-2}
      # в”Ђв”Ђ Git providers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - FORGEJO_HOST_PORT=${FORGEJO_HOST_PORT:-3000}
      - GIT_PROVIDER_1=${GIT_PROVIDER_1:-forgejo}
      - GIT_PROVIDER_1_URL=${GIT_PROVIDER_1_URL:-http://host-gateway:3000}
      - GIT_PROVIDER_1_TOKEN=${GIT_PROVIDER_1_TOKEN:-${FORGEJO_TOKEN}}
      - GIT_PROVIDER_1_WEBHOOK_SECRET=${GIT_PROVIDER_1_WEBHOOK_SECRET:-}
      - GIT_PROVIDER_2=${GIT_PROVIDER_2:-}
      - GIT_PROVIDER_2_APP_ID=${GIT_PROVIDER_2_APP_ID:-}
      - GIT_PROVIDER_2_PRIVATE_KEY_B64=${GIT_PROVIDER_2_PRIVATE_KEY_B64:-}
      - GIT_PROVIDER_2_WEBHOOK_SECRET=${GIT_PROVIDER_2_WEBHOOK_SECRET:-}
      - GIT_PROVIDER_2_INSTALLATION_ID=${GIT_PROVIDER_2_INSTALLATION_ID:-}
      # в”Ђв”Ђ Project context в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - PROJECT_DATA_DIR=/projects
      - COOLIFY_HOST_PORT=${COOLIFY_HOST_PORT:-8000}
      - COOLIFY_PREVIEW_DOMAIN=${COOLIFY_PREVIEW_DOMAIN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WEBHOOK_PORT=9000
      - HTTP_PROXY=http://cdw-squid:3128
      - HTTPS_PROXY=http://cdw-squid:3128
      - NO_PROXY=localhost,127.0.0.1,ollama,devdocs,searxng,browserless,mcp-docs,cdw-squid
      - EPHEMERAL_MEMORY=${EPHEMERAL_MEMORY:-1g}
      - EPHEMERAL_CPUS=${EPHEMERAL_CPUS:-1.0}
      - EPHEMERAL_TIMEOUT=${EPHEMERAL_TIMEOUT:-300}
      - SCHEDULER_PORT=${SCHEDULER_PORT:-7070}
      - HUMAN_IDLE_MS=${HUMAN_IDLE_MS:-1800000}
      - GATE_MAX_RETRIES=${GATE_MAX_RETRIES:-3}
      - GATE_RETRY_UPGRADE=${GATE_RETRY_UPGRADE:-true}
      - LOOP_DETECT_THRESHOLD=${LOOP_DETECT_THRESHOLD:-2}
      - AGENT_GIT_LOGIN=${AGENT_GIT_LOGIN:-agent}
      - WORKER_IMAGE=ghcr.io/pikatsuto/cdw-worker:latest
      - ORCHESTRATOR_PORT=${ORCHESTRATOR_PORT:-9001}
    volumes:
      - openclaw_agent_data:/home/kasm-user/.openclaw
      - squid_whitelist:/etc/squid/whitelist
      - project_data:/projects
      # GitHub App private key (optional)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # в”Ђв”Ђ openclaw-chat в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  openclaw-chat:
    image: ghcr.io/pikatsuto/cdw-chat:latest
    container_name: openclaw-chat
    restart: unless-stopped
    privileged: true
    security_opt:
      - apparmor:unconfined
    depends_on:
      ollama:
        condition: service_healthy
      squid:
        condition: service_healthy
      mcp-docs:
        condition: service_healthy
    networks:
      - coolify
      - proxy-internal-net  # в†” squid (proxy) вЂ” no direct internet
      - backend
      - mcp-net    # MCP access only, not direct docs-net
    environment:
      - OPENCLAW_GATEWAY_PORT=18791
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:27b-q3_k_m}
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      # в”Ђв”Ђ Models by level в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_STANDARD=${MODEL_STANDARD:-qwen3.5:9b}
      - MODEL_LIGHT=${MODEL_LIGHT:-qwen3.5:4b}
      - MODEL_TRIVIAL=${MODEL_TRIVIAL:-qwen3.5:2b}
      - MODEL_CPU=${MODEL_CPU:-qwen3.5:0.8b}
      # в”Ђв”Ђ Git providers (read-only for chat) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - AGENT_GIT_LOGIN=${AGENT_GIT_LOGIN:-agent}
      - ORCHESTRATOR_URL=http://openclaw-agent:9001
      - GIT_PROVIDER_1=${GIT_PROVIDER_1:-forgejo}
      - GIT_PROVIDER_1_URL=${GIT_PROVIDER_1_URL:-http://host-gateway:3000}
      - GIT_PROVIDER_1_TOKEN=${GIT_PROVIDER_1_TOKEN:-${FORGEJO_TOKEN}}
      - GIT_PROVIDER_2=${GIT_PROVIDER_2:-}
      - GIT_PROVIDER_2_APP_ID=${GIT_PROVIDER_2_APP_ID:-}
      - GIT_PROVIDER_2_PRIVATE_KEY_B64=${GIT_PROVIDER_2_PRIVATE_KEY_B64:-}
      - GIT_PROVIDER_2_INSTALLATION_ID=${GIT_PROVIDER_2_INSTALLATION_ID:-}
      # в”Ђв”Ђ Project context в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - PROJECT_DATA_DIR=/projects
      - HTTPS_PROXY=http://cdw-squid:3128
      - HTTP_PROXY=http://cdw-squid:3128
      - NO_PROXY=localhost,127.0.0.1,ollama,devdocs,searxng,browserless,mcp-docs,cdw-squid
      - EPHEMERAL_MEMORY=${EPHEMERAL_MEMORY:-512m}
      - EPHEMERAL_CPUS=${EPHEMERAL_CPUS:-0.5}
      - EPHEMERAL_TIMEOUT=${EPHEMERAL_TIMEOUT:-60}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # в”Ђв”Ђ Dev Container в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - HOST_DOCKER_SOCK=/var/run/host-docker.sock
      - DEVCONTAINER_IMAGE=${DEVCONTAINER_IMAGE:-ghcr.io/pikatsuto/cdw-devcontainer:latest}
      - DEVCONTAINER_MEMORY=${DEVCONTAINER_MEMORY:-4g}
      - DEVCONTAINER_CPUS=${DEVCONTAINER_CPUS:-2.0}
      - DEV_DOMAIN=${DEV_DOMAIN}
      - DEV_NETWORK=${DEV_NETWORK:-coolify}
      - DEV_IDLE_MS=${DEV_IDLE_MS:-1800000}
    volumes:
      - openclaw_chat_data:/home/kasm-user/.openclaw
      - squid_whitelist:/etc/squid/whitelist
      - project_data:/projects
      # Host Docker socket вЂ” mounted under /var/run/host-docker.sock
      # to NOT overwrite the internal rootless DinD
      # DOCKER_HOST=unix:///var/run/host-docker.sock used only
      # for spawning ephemeral Code Server containers via Traefik
      - /var/run/docker.sock:/var/run/host-docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-chat.rule=Host(`${CHAT_DOMAIN}`)"
      - "traefik.http.routers.openclaw-chat.entrypoints=https"
      - "traefik.http.routers.openclaw-chat.tls=true"
      - "traefik.http.routers.openclaw-chat.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openclaw-chat.service=openclaw-chat-svc"
      - "traefik.http.services.openclaw-chat-svc.loadbalancer.server.port=18791"
      - "traefik.http.middlewares.openclaw-ws.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.openclaw-chat.middlewares=openclaw-ws"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18791/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
