###############################################################################
# Stack: Kasm Workspaces + Ollama + openclaw-agent + openclaw-chat
#
# All images are pre-built on GHCR via GitHub Actions.
# No local build, no config bind mounts.
# Configs (Squid, SearXNG) are embedded in their images and copied
# into volumes on first startup by their entrypoints.
#
# External networks to verify before startup:
#   docker network ls | grep -E "coolify|forgejo"
###############################################################################

networks:
  coolify:
    external: true

  frontend:
    driver: bridge

  backend:
    driver: bridge
    internal: true

  forgejo-internal:
    driver: bridge
    internal: true

  docs-net:
    driver: bridge

  mcp-net:
    driver: bridge
    internal: true   # agents ↔ mcp-docs/devdocs/searxng/browserless only

  proxy-net:
    driver: bridge
    # not internal: squid needs internet access for proxying

  proxy-internal-net:
    driver: bridge
    internal: true   # openclaw-agent and openclaw-chat ↔ squid only

volumes:
  ollama_data:
  ollama_cpu_data:
  gguf_cache:        # HuggingFace cache for Qwen3.5-27B-Q3_K_M.gguf (13.5GB)
  project_data:      # shared project context across all services (memory, handoffs, rules)
  devdocs_data:
  searxng_data:
  squid_etc:
  squid_whitelist:
  squid_cache:
  squid_logs:
  openclaw_agent_data:
  openclaw_agent_docker:
  openclaw_chat_data:
  openclaw_chat_docker:
  forgejo_db:
  forgejo_data:
  forgejo_dind:
  forgejo_runner_data:
  forgejo_runner_work:

services:

  # ── Forgejo — PostgreSQL ───────────────────────────────────────────────────
  forgejo-db:
    image: postgres:16-alpine
    container_name: forgejo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: forgejo
      POSTGRES_USER: forgejo
      POSTGRES_PASSWORD: ${FORGEJO_DB_PASSWORD}
    volumes:
      - forgejo_db:/var/lib/postgresql/data
    networks:
      - forgejo-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgejo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Forgejo — Git server ───────────────────────────────────────────────────
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forgejo
    restart: unless-stopped
    depends_on:
      forgejo-db:
        condition: service_healthy
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__database__DB_TYPE: postgres
      FORGEJO__database__HOST: forgejo-db:5432
      FORGEJO__database__NAME: forgejo
      FORGEJO__database__USER: forgejo
      FORGEJO__database__PASSWD: ${FORGEJO_DB_PASSWORD}
      FORGEJO__server__DOMAIN: ${GIT_DOMAIN}
      FORGEJO__server__ROOT_URL: https://${GIT_DOMAIN}/
      FORGEJO__server__SSH_DOMAIN: ${GIT_DOMAIN}
      FORGEJO__server__SSH_PORT: ${FORGEJO_SSH_PORT:-2222}
      FORGEJO__server__HTTP_PORT: 3000
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__actions__ENABLED: "true"
      FORGEJO__mailer__ENABLED: "false"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY}
      FORGEJO__security__INTERNAL_TOKEN: ${FORGEJO_INTERNAL_TOKEN}
    volumes:
      - forgejo_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${FORGEJO_SSH_PORT:-2222}:22"
    networks:
      - forgejo-internal
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.forgejo-https.rule=Host(`${GIT_DOMAIN}`)"
      - "traefik.http.routers.forgejo-https.entrypoints=https"
      - "traefik.http.routers.forgejo-https.tls=true"
      - "traefik.http.routers.forgejo-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.forgejo-https.service=forgejo-svc"
      - "traefik.http.routers.forgejo-http.rule=Host(`${GIT_DOMAIN}`)"
      - "traefik.http.routers.forgejo-http.entrypoints=http"
      - "traefik.http.routers.forgejo-http.middlewares=redirect-to-https"
      - "traefik.http.services.forgejo-svc.loadbalancer.server.port=3000"
      - "traefik.docker.network=coolify"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Forgejo — Docker-in-Docker (Actions CI) ────────────────────────────────
  forgejo-dind:
    image: docker:27-dind
    container_name: forgejo-dind
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - forgejo_dind:/var/lib/docker
      - forgejo_runner_work:/workspace
    networks:
      - forgejo-internal
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock"]

  # ── Forgejo — Runner (Actions executor) ────────────────────────────────────
  forgejo-runner:
    image: code.forgejo.org/forgejo/runner:12
    container_name: forgejo-runner
    restart: unless-stopped
    depends_on:
      - forgejo
      - forgejo-dind
    user: root
    environment:
      DOCKER_HOST: tcp://forgejo-dind:2375
      FORGEJO_INSTANCE_URL: https://${GIT_DOMAIN}
      FORGEJO_RUNNER_TOKEN: ${FORGEJO_RUNNER_TOKEN}
      FORGEJO_RUNNER_NAME: ${FORGEJO_RUNNER_NAME:-cdw-runner}
      FORGEJO_RUNNER_LABELS: ${FORGEJO_RUNNER_LABELS:-debian-latest:docker://debian:trixie-slim,node-24:docker://node:24-bookworm,docker:docker://docker:27}
    volumes:
      - forgejo_runner_data:/data
      - forgejo_runner_work:/workspace
    networks:
      - forgejo-internal
      - coolify
    command:
      - sh
      - -c
      - |
        forgejo-runner register \
          --no-interactive \
          --instance $$FORGEJO_INSTANCE_URL \
          --token $$FORGEJO_RUNNER_TOKEN \
          --name $$FORGEJO_RUNNER_NAME \
          --labels $$FORGEJO_RUNNER_LABELS
        forgejo-runner daemon


  # ── Ollama — NVIDIA (RTX 2080 Ti + GTX 1660 = 17 GB VRAM) ──────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama CPU — qwen3.5:0.8b only, zero GPU VRAM ─────────────────────────
  # Used by the gpu-scheduler for ambiguity analysis and structured
  # extraction of issues (gray zone 45-75). Runs on CPU, separate from ollama
  # to guarantee zero interference with ongoing GPU inferences.
  # Also used as human conversational buffer when GPUs are saturated.
  ollama-cpu:
    image: ollama/ollama:latest
    container_name: ollama-cpu
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ollama_cpu_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=0          # Force CPU only
      - OLLAMA_NUM_PARALLEL=2     # Max 2 simultaneous requests (analysis + buffer)
      - OLLAMA_KEEP_ALIVE=5m      # Unload model after 5min idle
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Ollama init — pull all models on first startup ─────────────────────────
  # Ephemeral container (restart: no) that runs once.
  # Waits for ollama and ollama-cpu to be healthy, then:
  #   - Pulls qwen3.5:9b, 4b, 2b from the Ollama registry (GPU)
  #   - Downloads Qwen3.5-27B-Q3_K_M.gguf from HuggingFace and imports it
  #   - Pulls qwen3.5:0.8b on ollama-cpu
  # Models are persisted in ollama_data / ollama_cpu_data volumes.
  # On stack restart, ollama-init returns 0 immediately since models
  # are already present (checked via /api/tags before pull).
  ollama-init:
    image: ghcr.io/pikatsuto/cdw-ollama-init:latest
    container_name: ollama-init
    restart: "no"
    networks:
      - backend
    volumes:
      - ollama_data:/root/.ollama
      - gguf_cache:/tmp/gguf-cache
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      - GGUF_CACHE_DIR=/tmp/gguf-cache
    depends_on:
      ollama:
        condition: service_healthy
      ollama-cpu:
        condition: service_healthy

  # ── devcontainer — NOTE ───────────────────────────────────────────────────────
  # Code Server sessions are EPHEMERAL containers dynamically spawned
  # by the orchestrator (POST /dev/create) — not a fixed service in this compose.
  #
  # Image: ghcr.io/pikatsuto/cdw-devcontainer:latest (built by CI)
  # Spawn via: openclaw-agent → docker run --rm --network coolify ...
  # Ephemeral URLs via dynamic Coolify labels (Traefik): dev-<id>.<DEV_DOMAIN>
  #
  # Persistent per-user volumes (auto-created on first spawn):
  #   dev_user_<userId>_vscode      ← VSCode settings + keybindings
  #   dev_user_<userId>_extensions  ← installed extensions
  #   dev_user_<userId>_openclaw    ← OpenClaw gateway config
  #
  # Variables to add in .env:
  #   DEVCONTAINER_IMAGE, DEVCONTAINER_MEMORY, DEVCONTAINER_CPUS
  #   DEV_DOMAIN, DEV_IDLE_MS

  # ── DevDocs ──────────────────────────────────────────────────────────────────
  devdocs:
    image: ghcr.io/freecodecamp/devdocs:latest
    container_name: devdocs
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    ports:
      - "127.0.0.1:9292:9292"
    volumes:
      - devdocs_data:/devdocs/public/docs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9292"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── SearXNG ──────────────────────────────────────────────────────────────────
  searxng:
    image: ghcr.io/pikatsuto/cdw-searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    ports:
      - "127.0.0.1:8888:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Browserless ──────────────────────────────────────────────────────────────
  browserless:
    image: ghcr.io/pikatsuto/cdw-browserless:latest
    container_name: browserless
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    ports:
      - "127.0.0.1:3457:3000"
    shm_size: '512mb'
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── MCP Docs ─────────────────────────────────────────────────────────────────
  mcp-docs:
    image: ghcr.io/pikatsuto/cdw-mcp-docs:latest
    container_name: mcp-docs
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
      - backend
    depends_on:
      devdocs:
        condition: service_healthy
      searxng:
        condition: service_healthy
      browserless:
        condition: service_healthy
    environment:
      - DEVDOCS_URL=http://devdocs:9292
      - SEARXNG_URL=http://searxng:8080
      - NODRIVER_URL=http://browserless:3000
      - MAX_RESULTS=5
      - FETCH_TIMEOUT=8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Squid agent ──────────────────────────────────────────────────────────────
  # Outbound proxy for openclaw-agent. Shared whitelist via squid_agent_whitelist.
  # Hot unblock:
  #   docker exec agent-squid sh -c "echo '.domain.com' >> /etc/squid/whitelist/whitelist.conf && squid -k reconfigure"
  squid:
    image: ghcr.io/pikatsuto/cdw-squid:latest
    container_name: cdw-squid
    restart: unless-stopped
    networks:
      - proxy-net
      - proxy-internal-net
    volumes:
      - squid_etc:/etc/squid
      - squid_whitelist:/etc/squid/whitelist
      - squid_cache:/var/spool/squid
      - squid_logs:/var/log/squid
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── openclaw-agent ────────────────────────────────────────────────────────────
  # Autonomous development agent, triggered by Forgejo webhook.
  # No exposed UI. Configure the webhook in Forgejo:
  #   Repo → Settings → Webhooks → http://openclaw-agent:9000/webhook
  openclaw-agent:
    image: ghcr.io/pikatsuto/cdw-agent:latest
    container_name: openclaw-agent
    restart: unless-stopped
    privileged: true
    security_opt:
      - apparmor:unconfined
    depends_on:
      ollama:
        condition: service_healthy
      squid:
        condition: service_healthy
      mcp-docs:
        condition: service_healthy
    networks:
      - coolify
      - proxy-internal-net  # ↔ squid (proxy) — no direct internet
      - backend             # Ollama
      - mcp-net             # mcp-docs, devdocs, searxng, browserless
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:27b-q3_k_m}
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      # ── Models by complexity level ──────────────────────────────────────
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_STANDARD=${MODEL_STANDARD:-qwen3.5:9b}
      - MODEL_LIGHT=${MODEL_LIGHT:-qwen3.5:4b}
      - MODEL_TRIVIAL=${MODEL_TRIVIAL:-qwen3.5:2b}
      - MODEL_CPU=${MODEL_CPU:-qwen3.5:0.8b}
      - VRAM_COMPLEX=${VRAM_COMPLEX:-14}
      - VRAM_STANDARD=${VRAM_STANDARD:-5}
      - VRAM_LIGHT=${VRAM_LIGHT:-3}
      - VRAM_TRIVIAL=${VRAM_TRIVIAL:-2}
      # ── Git providers ───────────────────────────────────────────────────
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - FORGEJO_HOST_PORT=${FORGEJO_HOST_PORT:-3000}
      - GIT_PROVIDER_1=${GIT_PROVIDER_1:-forgejo}
      - GIT_PROVIDER_1_URL=${GIT_PROVIDER_1_URL:-http://forgejo:3000}
      - GIT_PROVIDER_1_TOKEN=${GIT_PROVIDER_1_TOKEN:-${FORGEJO_TOKEN}}
      - GIT_PROVIDER_1_WEBHOOK_SECRET=${GIT_PROVIDER_1_WEBHOOK_SECRET:-}
      - GIT_PROVIDER_2=${GIT_PROVIDER_2:-}
      - GIT_PROVIDER_2_APP_ID=${GIT_PROVIDER_2_APP_ID:-}
      - GIT_PROVIDER_2_PRIVATE_KEY_B64=${GIT_PROVIDER_2_PRIVATE_KEY_B64:-}
      - GIT_PROVIDER_2_WEBHOOK_SECRET=${GIT_PROVIDER_2_WEBHOOK_SECRET:-}
      - GIT_PROVIDER_2_INSTALLATION_ID=${GIT_PROVIDER_2_INSTALLATION_ID:-}
      # ── Project context ─────────────────────────────────────────────────
      - PROJECT_DATA_DIR=/projects
      - COOLIFY_HOST_PORT=${COOLIFY_HOST_PORT:-8000}
      - COOLIFY_PREVIEW_DOMAIN=${COOLIFY_PREVIEW_DOMAIN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WEBHOOK_PORT=9000
      - HTTP_PROXY=http://cdw-squid:3128
      - HTTPS_PROXY=http://cdw-squid:3128
      - NO_PROXY=localhost,127.0.0.1,ollama,devdocs,searxng,browserless,mcp-docs,cdw-squid
      - EPHEMERAL_MEMORY=${EPHEMERAL_MEMORY:-1g}
      - EPHEMERAL_CPUS=${EPHEMERAL_CPUS:-1.0}
      - EPHEMERAL_TIMEOUT=${EPHEMERAL_TIMEOUT:-300}
      - SCHEDULER_PORT=${SCHEDULER_PORT:-7070}
      - HUMAN_IDLE_MS=${HUMAN_IDLE_MS:-1800000}
      - GATE_MAX_RETRIES=${GATE_MAX_RETRIES:-3}
      - GATE_RETRY_UPGRADE=${GATE_RETRY_UPGRADE:-true}
      - LOOP_DETECT_THRESHOLD=${LOOP_DETECT_THRESHOLD:-2}
      - AGENT_GIT_LOGIN=${AGENT_GIT_LOGIN:-agent}
      - WORKER_IMAGE=ghcr.io/pikatsuto/cdw-worker:latest
      - ORCHESTRATOR_PORT=${ORCHESTRATOR_PORT:-9001}
    volumes:
      - openclaw_agent_data:/home/rootless/.openclaw
      - openclaw_agent_docker:/home/rootless/.local/share/docker
      - squid_whitelist:/etc/squid/whitelist
      - project_data:/projects
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── openclaw-chat ─────────────────────────────────────────────────────────────
  openclaw-chat:
    image: ghcr.io/pikatsuto/cdw-chat:latest
    container_name: openclaw-chat
    restart: unless-stopped
    privileged: true
    security_opt:
      - apparmor:unconfined
    depends_on:
      ollama:
        condition: service_healthy
      squid:
        condition: service_healthy
      mcp-docs:
        condition: service_healthy
    networks:
      - coolify
      - proxy-internal-net  # ↔ squid (proxy) — no direct internet
      - backend
      - mcp-net    # MCP access only, not direct docs-net
    environment:
      - OPENCLAW_GATEWAY_PORT=18791
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:27b-q3_k_m}
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      # ── Models by level ─────────────────────────────────────────────────
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_STANDARD=${MODEL_STANDARD:-qwen3.5:9b}
      - MODEL_LIGHT=${MODEL_LIGHT:-qwen3.5:4b}
      - MODEL_TRIVIAL=${MODEL_TRIVIAL:-qwen3.5:2b}
      - MODEL_CPU=${MODEL_CPU:-qwen3.5:0.8b}
      # ── Git providers (read-only for chat) ──────────────────────────────
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - AGENT_GIT_LOGIN=${AGENT_GIT_LOGIN:-agent}
      - ORCHESTRATOR_URL=http://openclaw-agent:9001
      - GIT_PROVIDER_1=${GIT_PROVIDER_1:-forgejo}
      - GIT_PROVIDER_1_URL=${GIT_PROVIDER_1_URL:-http://forgejo:3000}
      - GIT_PROVIDER_1_TOKEN=${GIT_PROVIDER_1_TOKEN:-${FORGEJO_TOKEN}}
      - GIT_PROVIDER_2=${GIT_PROVIDER_2:-}
      - GIT_PROVIDER_2_APP_ID=${GIT_PROVIDER_2_APP_ID:-}
      - GIT_PROVIDER_2_PRIVATE_KEY_B64=${GIT_PROVIDER_2_PRIVATE_KEY_B64:-}
      - GIT_PROVIDER_2_INSTALLATION_ID=${GIT_PROVIDER_2_INSTALLATION_ID:-}
      # ── Project context ─────────────────────────────────────────────────
      - PROJECT_DATA_DIR=/projects
      - HTTPS_PROXY=http://cdw-squid:3128
      - HTTP_PROXY=http://cdw-squid:3128
      - NO_PROXY=localhost,127.0.0.1,ollama,devdocs,searxng,browserless,mcp-docs,cdw-squid
      - EPHEMERAL_MEMORY=${EPHEMERAL_MEMORY:-512m}
      - EPHEMERAL_CPUS=${EPHEMERAL_CPUS:-0.5}
      - EPHEMERAL_TIMEOUT=${EPHEMERAL_TIMEOUT:-60}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # ── Dev Container ───────────────────────────────────────────────────
      - HOST_DOCKER_SOCK=/var/run/host-docker.sock
      - DEVCONTAINER_IMAGE=${DEVCONTAINER_IMAGE:-ghcr.io/pikatsuto/cdw-devcontainer:latest}
      - DEVCONTAINER_MEMORY=${DEVCONTAINER_MEMORY:-4g}
      - DEVCONTAINER_CPUS=${DEVCONTAINER_CPUS:-2.0}
      - DEV_DOMAIN=${DEV_DOMAIN}
      - DEV_NETWORK=${DEV_NETWORK:-coolify}
      - DEV_IDLE_MS=${DEV_IDLE_MS:-1800000}
    volumes:
      - openclaw_chat_data:/home/rootless/.openclaw
      - openclaw_chat_docker:/home/rootless/.local/share/docker
      - squid_whitelist:/etc/squid/whitelist
      - project_data:/projects
      # Host Docker socket — mounted under /var/run/host-docker.sock
      # to NOT overwrite the internal rootless DinD
      # DOCKER_HOST=unix:///var/run/host-docker.sock used only
      # for spawning ephemeral Code Server containers via Coolify
      - /var/run/docker.sock:/var/run/host-docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-chat.rule=Host(`${CHAT_DOMAIN}`)"
      - "traefik.http.routers.openclaw-chat.entrypoints=https"
      - "traefik.http.routers.openclaw-chat.tls=true"
      - "traefik.http.routers.openclaw-chat.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openclaw-chat.service=openclaw-chat-svc"
      - "traefik.http.services.openclaw-chat-svc.loadbalancer.server.port=18791"
      - "traefik.http.middlewares.openclaw-ws.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.openclaw-chat.middlewares=openclaw-ws"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18791/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
