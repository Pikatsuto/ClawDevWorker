# .github/workflows/auto-promote.yml
# Automatically promotes agent feature branches to the target branch after PR merge.
#
# Flow:
#   1. Human merges PR: agent:features/xxx → user:features/xxx
#   2. This action detects the merge and creates a PR: features/xxx → main (or develop)
#   3. Human reviews and merges the promotion PR
#
# The feature branch is preserved on the user repo so the agent can resume
# work on it later if needed (re-fork and continue).
#
# Configured via .coderclaw/rules.yaml:
#   git_flow:
#     strategy: trunk       # trunk (→ main) | gitflow (→ develop)
#     target_branch: main   # or develop

name: Auto-promote agent branches

on:
  pull_request:
    types: [closed]

jobs:
  promote:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'agent/') ||
      startsWith(github.event.pull_request.head.ref, 'features/') ||
      startsWith(github.event.pull_request.head.ref, 'feat/') ||
      startsWith(github.event.pull_request.head.ref, 'fix/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read target branch from rules
        id: config
        run: |
          TARGET="main"
          if [ -f .coderclaw/rules.yaml ]; then
            # Extract target_branch from git_flow section
            TB=$(grep -A5 'git_flow:' .coderclaw/rules.yaml | grep 'target_branch:' | awk '{print $2}' | tr -d '"' | tr -d "'")
            [ -n "$TB" ] && TARGET="$TB"
          fi
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Target branch: $TARGET"

      - name: Check if promotion needed
        id: check
        run: |
          HEAD="${{ github.event.pull_request.base.ref }}"
          TARGET="${{ steps.config.outputs.target }}"
          # Skip if the PR already targeted the final branch
          if [ "$HEAD" = "$TARGET" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "PR already targets $TARGET — no promotion needed"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Will promote $HEAD → $TARGET"
          fi

      - name: Create promotion PR
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD="${{ github.event.pull_request.base.ref }}"
          TARGET="${{ steps.config.outputs.target }}"
          TITLE="promote: ${HEAD} → ${TARGET}"
          BODY="Auto-promotion from merged PR #${{ github.event.pull_request.number }}.

          Original: ${{ github.event.pull_request.title }}

          ---
          *Created automatically by auto-promote workflow.*"

          gh pr create \
            --base "$TARGET" \
            --head "$HEAD" \
            --title "$TITLE" \
            --body "$BODY" \
            2>&1 || echo "PR already exists or branch is up to date"
