http_port 3128
visible_hostname squid

# Whitelist générée dynamiquement au runtime par start-agent.sh (volume partagé)
# Déblocage à chaud : docker exec squid sh -c "echo '.domaine.com' >> /etc/squid/whitelist/whitelist.conf && squid -k reconfigure"
acl whitelist dstdomain "/etc/squid/whitelist/whitelist.conf"

acl agent_net src 172.0.0.0/8
acl agent_net src 10.0.0.0/8
acl agent_net src 192.168.0.0/16

http_access allow agent_net whitelist
http_access deny all

access_log /var/log/squid/access.log squid
cache_log  /var/log/squid/cache.log
cache_dir ufs /var/spool/squid 512 16 256
maximum_object_size 50 MB
