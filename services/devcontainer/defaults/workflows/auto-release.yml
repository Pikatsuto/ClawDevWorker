# .github/workflows/auto-release.yml
# Automatic semantic versioning and release notes from conventional commits.
#
# Trigger: merge to the release branch (default: main)
# Analyzes commits since the last tag → determines version bump → creates tag + release.
#
# Commit convention:
#   fix: ...         → patch  (1.0.1)
#   feat: ...        → minor  (1.1.0)
#   feat!: ...       → major  (2.0.0)
#   BREAKING CHANGE  → major  (2.0.0)
#
# Configured via .coderclaw/rules.yaml:
#   releases:
#     enabled: true
#     strategy: conventional    # conventional | manual (disables this action)
#     branch: main
#     prefix: v

name: Auto-release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for tag analysis

      - name: Check if releases are enabled
        id: config
        run: |
          ENABLED="true"
          STRATEGY="conventional"
          PREFIX="v"
          if [ -f .coderclaw/rules.yaml ]; then
            _ENABLED=$(grep -A5 'releases:' .coderclaw/rules.yaml | grep 'enabled:' | awk '{print $2}' | tr -d '"' || true)
            _STRATEGY=$(grep -A5 'releases:' .coderclaw/rules.yaml | grep 'strategy:' | awk '{print $2}' | tr -d '"' || true)
            _PREFIX=$(grep -A5 'releases:' .coderclaw/rules.yaml | grep 'prefix:' | awk '{print $2}' | tr -d '"' || true)
            [ -n "$_ENABLED" ] && ENABLED="$_ENABLED"
            [ -n "$_STRATEGY" ] && STRATEGY="$_STRATEGY"
            [ -n "$_PREFIX" ] && PREFIX="$_PREFIX"
          fi
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          echo "strategy=$STRATEGY" >> $GITHUB_OUTPUT
          echo "prefix=$PREFIX" >> $GITHUB_OUTPUT

      - name: Determine version bump
        if: steps.config.outputs.enabled == 'true' && steps.config.outputs.strategy == 'conventional'
        id: version
        run: |
          PREFIX="${{ steps.config.outputs.prefix }}"

          # Find the latest tag
          LATEST_TAG=$(git tag -l "${PREFIX}*" --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG=""
            CURRENT_MAJOR=0; CURRENT_MINOR=0; CURRENT_PATCH=0
            RANGE="HEAD"
            echo "No previous tag found — starting at ${PREFIX}0.1.0"
          else
            VERSION="${LATEST_TAG#$PREFIX}"
            CURRENT_MAJOR=$(echo "$VERSION" | cut -d. -f1)
            CURRENT_MINOR=$(echo "$VERSION" | cut -d. -f2)
            CURRENT_PATCH=$(echo "$VERSION" | cut -d. -f3)
            RANGE="${LATEST_TAG}..HEAD"
            echo "Latest tag: $LATEST_TAG ($VERSION)"
          fi

          # Analyze commits since last tag
          COMMITS=$(git log $RANGE --pretty=format:"%s" 2>/dev/null || echo "")
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No new commits since $LATEST_TAG"
            exit 0
          fi

          # Determine bump level
          BUMP="none"
          if echo "$COMMITS" | grep -qE '^feat!:|^fix!:|^refactor!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^fix(\(.+\))?:|^perf(\(.+\))?:'; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No releasable commits (feat/fix/perf) since $LATEST_TAG"
            exit 0
          fi

          # Calculate new version
          case "$BUMP" in
            major) NEW_MAJOR=$((CURRENT_MAJOR + 1)); NEW_MINOR=0; NEW_PATCH=0 ;;
            minor) NEW_MAJOR=$CURRENT_MAJOR; NEW_MINOR=$((CURRENT_MINOR + 1)); NEW_PATCH=0 ;;
            patch) NEW_MAJOR=$CURRENT_MAJOR; NEW_MINOR=$CURRENT_MINOR; NEW_PATCH=$((CURRENT_PATCH + 1)) ;;
          esac

          NEW_TAG="${PREFIX}${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "prev=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Bump: $BUMP → $NEW_TAG"

      - name: Generate changelog
        if: steps.version.outputs.skip == 'false'
        id: changelog
        run: |
          PREV="${{ steps.version.outputs.prev }}"
          RANGE="${PREV:+$PREV..}HEAD"

          echo "## What's Changed" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md

          # Breaking changes
          BREAKING=$(git log $RANGE --pretty=format:"%s" | grep -E '^feat!:|^fix!:|^refactor!:|BREAKING CHANGE' || true)
          if [ -n "$BREAKING" ]; then
            echo "### ⚠️ Breaking Changes" >> /tmp/changelog.md
            echo "$BREAKING" | while read -r line; do echo "- $line" >> /tmp/changelog.md; done
            echo "" >> /tmp/changelog.md
          fi

          # Features
          FEATS=$(git log $RANGE --pretty=format:"%s" | grep -E '^feat(\(.+\))?:' | grep -v '!' || true)
          if [ -n "$FEATS" ]; then
            echo "### ✨ Features" >> /tmp/changelog.md
            echo "$FEATS" | while read -r line; do echo "- $line" >> /tmp/changelog.md; done
            echo "" >> /tmp/changelog.md
          fi

          # Fixes
          FIXES=$(git log $RANGE --pretty=format:"%s" | grep -E '^fix(\(.+\))?:' | grep -v '!' || true)
          if [ -n "$FIXES" ]; then
            echo "### 🐛 Fixes" >> /tmp/changelog.md
            echo "$FIXES" | while read -r line; do echo "- $line" >> /tmp/changelog.md; done
            echo "" >> /tmp/changelog.md
          fi

          # Other notable changes
          OTHER=$(git log $RANGE --pretty=format:"%s" | grep -E '^(refactor|perf|test|docs)(\(.+\))?:' | grep -v '!' || true)
          if [ -n "$OTHER" ]; then
            echo "### 🔧 Other" >> /tmp/changelog.md
            echo "$OTHER" | while read -r line; do echo "- $line" >> /tmp/changelog.md; done
            echo "" >> /tmp/changelog.md
          fi

          echo "---" >> /tmp/changelog.md
          echo "*Release automated by ClawDevWorker*" >> /tmp/changelog.md

          cat /tmp/changelog.md

      - name: Create tag and release
        if: steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/changelog.md \
            2>&1 || echo "Release creation failed (may need Forgejo API instead)"
