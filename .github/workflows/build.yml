name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/pikatsuto

jobs:
  # Dynamic discovery of services to build
  discover:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.scan.outputs.services }}
    steps:
      - uses: actions/checkout@v6
      - id: scan
        run: |
          # Discover all services with a Dockerfile
          services=$(find services -maxdepth 2 -name Dockerfile \
            | sed 's|/Dockerfile||' \
            | sed 's|services/||' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "services=$services" >> $GITHUB_OUTPUT
          echo "Detected services: $services"

  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.services) }}
    steps:
      - uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/cdw-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push — ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Write status
        if: always()
        run: |
          mkdir -p /tmp/build-status
          echo "${{ job.status }}" > /tmp/build-status/${{ matrix.service }}

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-status-${{ matrix.service }}
          path: /tmp/build-status/${{ matrix.service }}

  summary:
    needs: [discover, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download statuses
        uses: actions/download-artifact@v8
        with:
          pattern: build-status-*
          path: /tmp/build-status
          merge-multiple: true

      - name: Build summary
        run: |
          echo "## Build clawdevworker v14" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.discover.outputs.services }}' \
            | jq -r '.[]' | while read svc; do
              [ -z "$svc" ] && continue
              status_file="/tmp/build-status/$svc"
              if [ -f "$status_file" ] && [ "$(cat "$status_file")" = "success" ]; then
                echo "| cdw-$svc | ✅ |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| cdw-$svc | ❌ |" >> $GITHUB_STEP_SUMMARY
              fi
            done
