name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force rebuild all services (ignore cache)'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/pikatsuto

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      all_services: ${{ steps.changes.outputs.all }}
    steps:
      - uses: actions/checkout@v6

      - name: Restore previous hashes
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: /tmp/prev-hashes
          key: build-hashes-${{ github.ref_name }}
          restore-keys: build-hashes-

      - id: changes
        run: |
          FORCE="${{ inputs.force_all || 'false' }}"

          ALL="[]"
          MATRIX="[]"
          mkdir -p /tmp/new-hashes

          for dockerfile in services/*/Dockerfile; do
            svc=$(echo "$dockerfile" | cut -d/ -f2)
            ALL=$(echo "$ALL" | jq -c --arg s "$svc" '. + [$s]')

            # Collect all COPY sources from the Dockerfile (excluding --from= stages)
            COPY_DIRS=$(grep -E '^\s*COPY\s' "$dockerfile" \
              | grep -v '\-\-from=' \
              | sed -E 's/^\s*COPY\s+(--[^ ]+ +)*//' \
              | tr ' \\' '\n' \
              | grep -v '^/$' \
              | grep -v '^$' \
              | sort -u)

            # Hash all source files (Dockerfile + COPY sources)
            HASH=$(find $COPY_DIRS "$dockerfile" -type f 2>/dev/null | sort | xargs sha256sum 2>/dev/null | sha256sum | cut -d' ' -f1)
            echo "$HASH" > "/tmp/new-hashes/${svc}"

            if [ "$FORCE" = "true" ]; then
              MATRIX=$(echo "$MATRIX" | jq -c --arg s "$svc" '. + [$s]')
              echo "  ✓ $svc — forced rebuild"
              continue
            fi

            # Compare with previous hash
            PREV=""
            [ -f "/tmp/prev-hashes/${svc}" ] && PREV=$(cat "/tmp/prev-hashes/${svc}")

            if [ "$HASH" != "$PREV" ]; then
              MATRIX=$(echo "$MATRIX" | jq -c --arg s "$svc" '. + [$s]')
              echo "  ✓ $svc — hash changed"
            else
              echo "  ⊘ $svc — unchanged"
            fi
          done

          echo "all=$ALL" >> $GITHUB_OUTPUT
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Build: $MATRIX"

      - name: Save new hashes
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/new-hashes
          key: build-hashes-${{ github.ref_name }}-${{ github.sha }}

  build:
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Login GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/cdw-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push — ${{ matrix.service }}
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_CHECKS_ANNOTATIONS: false
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.service }}-v2
            type=registry,ref=${{ env.IMAGE_PREFIX }}/cdw-${{ matrix.service }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service }}-v2
            type=inline

      - name: Write status
        if: always()
        run: |
          mkdir -p /tmp/build-status
          echo "${{ job.status }}" > /tmp/build-status/${{ matrix.service }}

      - name: Upload status
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-status-${{ matrix.service }}
          path: /tmp/build-status/${{ matrix.service }}

  summary:
    needs: [discover, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download statuses
        uses: actions/download-artifact@v8
        with:
          pattern: build-status-*
          path: /tmp/build-status
          merge-multiple: true

      - name: Build summary
        run: |
          echo "## Build clawdevworker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          MATRIX='${{ needs.discover.outputs.matrix }}'
          ALL='${{ needs.discover.outputs.all_services }}'

          echo "$ALL" | jq -r '.[]' | while read svc; do
            [ -z "$svc" ] && continue
            status_file="/tmp/build-status/$svc"
            if echo "$MATRIX" | jq -e --arg s "$svc" 'index($s) != null' > /dev/null 2>&1; then
              if [ -f "$status_file" ] && [ "$(cat "$status_file")" = "success" ]; then
                echo "| cdw-$svc | ✅ built |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| cdw-$svc | ❌ failed |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| cdw-$svc | ⊘ skipped |" >> $GITHUB_STEP_SUMMARY
            fi
          done
