###############################################################################
# Stack clawdevworker — TrueNAS Scale / Portainer
#
# Compose autonome : toutes les images depuis GHCR, aucun fichier local requis.
# Variables d'environnement : saisir dans Portainer (Stacks → Environment variables)
#
# Variables OBLIGATOIRES :
#   CHAT_DOMAIN                 ex: chat.example.com
#   OPENCLAW_GATEWAY_PASSWORD   mot de passe gateway OpenClaw
#   GIT_PROVIDER_1_TOKEN        token compte agent Forgejo (scope: repo)
#   FORGEJO_TOKEN               alias du token ci-dessus
#
# Variables OPTIONNELLES (valeurs par défaut ci-dessous) :
#   MODEL_COMPLEX               qwen3.5:27b-q3_k_m
#   MODEL_STANDARD              qwen3.5:9b
#   MODEL_LIGHT                 qwen3.5:4b
#   MODEL_TRIVIAL               qwen3.5:2b
#   MODEL_CPU                   qwen3.5:0.8b
#   GIT_PROVIDER_1_URL          http://host-gateway:3000
#   GIT_PROVIDER_2              (vide = GitHub désactivé)
#   GIT_PROVIDER_2_APP_ID       (GitHub App ID)
#   GIT_PROVIDER_2_INSTALLATION_ID
#   AGENT_GIT_LOGIN             agent
#   FORGEJO_HOST_PORT           3000
#   COOLIFY_HOST_PORT           8000
#   GITHUB_TOKEN                (vide)
#   DEV_DOMAIN                  dev.example.com (wildcard DNS requis)
#   GATE_MAX_RETRIES            3
#   LOOP_DETECT_THRESHOLD       2
#
# Prérequis TrueNAS :
#   - Driver NVIDIA : UI TrueNAS → System → NVIDIA Driver → Install
#   - Réseaux externes Traefik/Coolify et Forgejo déjà existants :
#       docker network ls | grep -E "coolify|forgejo"
###############################################################################

networks:
  coolify:
    external: true

  frontend:
    driver: bridge

  backend:
    driver: bridge
    internal: true

  forgejo-net:
    external: true

  docs-net:
    driver: bridge

  mcp-net:
    driver: bridge
    internal: true

  proxy-net:
    driver: bridge

  proxy-internal-net:
    driver: bridge
    internal: true

volumes:
  ollama_data:
  ollama_cpu_data:
  gguf_cache:
  project_data:
  devdocs_data:
  searxng_data:
  squid_etc:
  squid_whitelist:
  squid_cache:
  squid_logs:
  openclaw_agent_data:
  openclaw_chat_data:

services:

  # ── Ollama GPU (RTX 2080 Ti + GTX 1660 = 17GB VRAM) ─────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Ollama CPU — orchestration + ambiguïté ────────────────────────────────────
  ollama-cpu:
    image: ollama/ollama:latest
    container_name: ollama-cpu
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ollama_cpu_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── ollama-init — téléchargement modèles (éphémère) ──────────────────────────
  ollama-init:
    image: ghcr.io/pikatsuto/cdw-ollama-init:latest
    container_name: ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-cpu:
        condition: service_healthy
    networks:
      - backend
    volumes:
      - ollama_data:/root/.ollama
      - gguf_cache:/tmp/gguf-cache
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_STANDARD=${MODEL_STANDARD:-qwen3.5:9b}
      - MODEL_LIGHT=${MODEL_LIGHT:-qwen3.5:4b}
      - MODEL_TRIVIAL=${MODEL_TRIVIAL:-qwen3.5:2b}
      - MODEL_CPU=${MODEL_CPU:-qwen3.5:0.8b}



  # ── DevDocs ───────────────────────────────────────────────────────────────────
  devdocs:
    image: ghcr.io/freecodecamp/devdocs:latest
    container_name: devdocs
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    volumes:
      - devdocs_data:/devdocs/public/docs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9292"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── SearXNG ───────────────────────────────────────────────────────────────────
  searxng:
    image: ghcr.io/pikatsuto/cdw-searxng:latest
    container_name: searxng
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Browserless ───────────────────────────────────────────────────────────────
  browserless:
    image: ghcr.io/pikatsuto/cdw-browserless:latest
    container_name: browserless
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
    shm_size: '512mb'
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── MCP Docs ──────────────────────────────────────────────────────────────────
  mcp-docs:
    image: ghcr.io/pikatsuto/cdw-mcp-docs:latest
    container_name: mcp-docs
    restart: unless-stopped
    networks:
      - docs-net
      - mcp-net
      - backend
    depends_on:
      devdocs:
        condition: service_healthy
      searxng:
        condition: service_healthy
      browserless:
        condition: service_healthy
    environment:
      - DEVDOCS_URL=http://devdocs:9292
      - SEARXNG_URL=http://searxng:8080
      - NODRIVER_URL=http://browserless:3000
      - MAX_RESULTS=5
      - FETCH_TIMEOUT=8000
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Squid proxy ───────────────────────────────────────────────────────────────
  squid:
    image: ghcr.io/pikatsuto/cdw-squid:latest
    container_name: cdw-squid
    restart: unless-stopped
    networks:
      - proxy-net
      - proxy-internal-net
    volumes:
      - squid_etc:/etc/squid
      - squid_whitelist:/etc/squid/whitelist
      - squid_cache:/var/spool/squid
      - squid_logs:/var/log/squid
    healthcheck:
      test: ["CMD", "squid", "-k", "check"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── openclaw-agent ────────────────────────────────────────────────────────────
  # Webhook : Forgejo → http://openclaw-agent:9000/webhook
  # Commande /retry dans les commentaires pour relancer un pipeline bloqué.
  openclaw-agent:
    image: ghcr.io/pikatsuto/cdw-agent:latest
    container_name: openclaw-agent
    restart: unless-stopped
    privileged: true
    security_opt:
      - apparmor:unconfined
    depends_on:
      ollama:
        condition: service_healthy
      ollama-cpu:
        condition: service_healthy
      squid:
        condition: service_healthy
      mcp-docs:
        condition: service_healthy
    networks:
      - coolify
      - proxy-internal-net
      - backend
      - mcp-net
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      - OLLAMA_MODEL=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_STANDARD=${MODEL_STANDARD:-qwen3.5:9b}
      - MODEL_LIGHT=${MODEL_LIGHT:-qwen3.5:4b}
      - MODEL_TRIVIAL=${MODEL_TRIVIAL:-qwen3.5:2b}
      - MODEL_CPU=${MODEL_CPU:-qwen3.5:0.8b}
      - VRAM_COMPLEX=${VRAM_COMPLEX:-14}
      - VRAM_STANDARD=${VRAM_STANDARD:-5}
      - VRAM_LIGHT=${VRAM_LIGHT:-3}
      - VRAM_TRIVIAL=${VRAM_TRIVIAL:-2}
      - GIT_PROVIDER_1=${GIT_PROVIDER_1:-forgejo}
      - GIT_PROVIDER_1_URL=${GIT_PROVIDER_1_URL:-http://host-gateway:3000}
      - GIT_PROVIDER_1_TOKEN=${GIT_PROVIDER_1_TOKEN:-${FORGEJO_TOKEN:-}}
      - GIT_PROVIDER_1_WEBHOOK_SECRET=${GIT_PROVIDER_1_WEBHOOK_SECRET:-}
      - GIT_PROVIDER_2=${GIT_PROVIDER_2:-}
      - GIT_PROVIDER_2_APP_ID=${GIT_PROVIDER_2_APP_ID:-}
      - GIT_PROVIDER_2_PRIVATE_KEY_PATH=${GIT_PROVIDER_2_PRIVATE_KEY_PATH:-}
      - GIT_PROVIDER_2_WEBHOOK_SECRET=${GIT_PROVIDER_2_WEBHOOK_SECRET:-}
      - GIT_PROVIDER_2_INSTALLATION_ID=${GIT_PROVIDER_2_INSTALLATION_ID:-}
      - AGENT_GIT_LOGIN=${AGENT_GIT_LOGIN:-agent}
      - FORGEJO_TOKEN=${FORGEJO_TOKEN:-}
      - FORGEJO_HOST_PORT=${FORGEJO_HOST_PORT:-3000}
      - COOLIFY_HOST_PORT=${COOLIFY_HOST_PORT:-8000}
      - COOLIFY_PREVIEW_DOMAIN=${COOLIFY_PREVIEW_DOMAIN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WEBHOOK_PORT=9000
      - HTTP_PROXY=http://cdw-squid:3128
      - HTTPS_PROXY=http://cdw-squid:3128
      - NO_PROXY=localhost,127.0.0.1,ollama,ollama-cpu,devdocs,searxng,browserless,mcp-docs,cdw-squid
      - PROJECT_DATA_DIR=/projects
      - GATE_MAX_RETRIES=${GATE_MAX_RETRIES:-3}
      - GATE_RETRY_UPGRADE=${GATE_RETRY_UPGRADE:-true}
      - LOOP_DETECT_THRESHOLD=${LOOP_DETECT_THRESHOLD:-2}
      - EPHEMERAL_MEMORY=${EPHEMERAL_MEMORY:-1g}
      - EPHEMERAL_CPUS=${EPHEMERAL_CPUS:-1.0}
      - EPHEMERAL_TIMEOUT=${EPHEMERAL_TIMEOUT:-300}
      - WORKER_IMAGE=ghcr.io/pikatsuto/cdw-worker:latest
    volumes:
      - openclaw_agent_data:/home/kasm-user/.openclaw
      - squid_whitelist:/etc/squid/whitelist
      - project_data:/projects
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── openclaw-chat ─────────────────────────────────────────────────────────────
  openclaw-chat:
    image: ghcr.io/pikatsuto/cdw-chat:latest
    container_name: openclaw-chat
    restart: unless-stopped
    privileged: true
    security_opt:
      - apparmor:unconfined
    depends_on:
      ollama:
        condition: service_healthy
      ollama-cpu:
        condition: service_healthy
      squid:
        condition: service_healthy
      mcp-docs:
        condition: service_healthy
    networks:
      - coolify
      - proxy-internal-net
      - backend
      - mcp-net
    environment:
      - OPENCLAW_GATEWAY_PORT=18791
      - OPENCLAW_GATEWAY_BIND=0.0.0.0
      - OPENCLAW_GATEWAY_PASSWORD=${OPENCLAW_GATEWAY_PASSWORD}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CPU_URL=http://ollama-cpu:11434
      - OLLAMA_MODEL=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_COMPLEX=${MODEL_COMPLEX:-qwen3.5:27b-q3_k_m}
      - MODEL_STANDARD=${MODEL_STANDARD:-qwen3.5:9b}
      - MODEL_LIGHT=${MODEL_LIGHT:-qwen3.5:4b}
      - MODEL_TRIVIAL=${MODEL_TRIVIAL:-qwen3.5:2b}
      - MODEL_CPU=${MODEL_CPU:-qwen3.5:0.8b}
      - GIT_PROVIDER_1=${GIT_PROVIDER_1:-forgejo}
      - GIT_PROVIDER_1_URL=${GIT_PROVIDER_1_URL:-http://host-gateway:3000}
      - GIT_PROVIDER_1_TOKEN=${GIT_PROVIDER_1_TOKEN:-${FORGEJO_TOKEN:-}}
      - GIT_PROVIDER_2=${GIT_PROVIDER_2:-}
      - GIT_PROVIDER_2_APP_ID=${GIT_PROVIDER_2_APP_ID:-}
      - GIT_PROVIDER_2_INSTALLATION_ID=${GIT_PROVIDER_2_INSTALLATION_ID:-}
      - FORGEJO_TOKEN=${FORGEJO_TOKEN:-}
      - PROJECT_DATA_DIR=/projects
      - HTTPS_PROXY=http://cdw-squid:3128
      - HTTP_PROXY=http://cdw-squid:3128
      - NO_PROXY=localhost,127.0.0.1,ollama,ollama-cpu,devdocs,searxng,browserless,mcp-docs,cdw-squid
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # ── Dev Container ─────────────────────────────────────────────
      - HOST_DOCKER_SOCK=/var/run/host-docker.sock
      - DEVCONTAINER_IMAGE=${DEVCONTAINER_IMAGE:-ghcr.io/pikatsuto/cdw-devcontainer:latest}
      - DEVCONTAINER_MEMORY=${DEVCONTAINER_MEMORY:-4g}
      - DEVCONTAINER_CPUS=${DEVCONTAINER_CPUS:-2.0}
      - DEV_DOMAIN=${DEV_DOMAIN}
      - DEV_NETWORK=${DEV_NETWORK:-coolify}
      - DEV_IDLE_MS=${DEV_IDLE_MS:-1800000}
      - EPHEMERAL_MEMORY=${EPHEMERAL_MEMORY:-512m}
      - EPHEMERAL_CPUS=${EPHEMERAL_CPUS:-0.5}
      - EPHEMERAL_TIMEOUT=${EPHEMERAL_TIMEOUT:-60}
      - HOST_DOCKER_SOCK=/var/run/host-docker.sock
    volumes:
      - openclaw_chat_data:/home/kasm-user/.openclaw
      - squid_whitelist:/etc/squid/whitelist
      - project_data:/projects
      - /var/run/docker.sock:/var/run/host-docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw-chat.rule=Host(`${CHAT_DOMAIN}`)"
      - "traefik.http.routers.openclaw-chat.entrypoints=https"
      - "traefik.http.routers.openclaw-chat.tls=true"
      - "traefik.http.routers.openclaw-chat.tls.certresolver=letsencrypt"
      - "traefik.http.routers.openclaw-chat.service=openclaw-chat-svc"
      - "traefik.http.services.openclaw-chat-svc.loadbalancer.server.port=18791"
      - "traefik.http.middlewares.openclaw-ws.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.openclaw-chat.middlewares=openclaw-ws"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18791/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
